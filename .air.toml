root = "."
tmp_dir = "/tmp/air"

[build]
  cmd = "CGO_ENABLED=0 go build -o /tmp/air/afineback ./cmd/server"
  bin = "/tmp/air/afineback"
  include_ext = ["go"]
  exclude_dir = ["seeds", "migrations", "vendor"]
  delay = 500

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
